name: alterday
description: "AlterDay mobile application."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Supabase
  supabase_flutter: ^2.9.1

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # SVG rendering
  flutter_svg: ^2.0.17

  # Animations
  flutter_animate: ^4.5.2

  # Environment variables
  flutter_dotenv: ^5.2.1

  # Persistent storage
  shared_preferences: ^2.5.5
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.6.3
  build_runner: ^2.4.14
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo/app-icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0F1117"
  adaptive_icon_foreground: "assets/logo/app-icon-fg.png"

flutter:
  uses-material-design: true

  generate: true

  assets:
    - assets/logo/
    - .env

  fonts:
    - family: Syne
      fonts:
        - asset: assets/fonts/Syne/Syne-VariableFont_wght.ttf
    - family: GeistMono
      fonts:
        - asset: assets/fonts/GeistMono/GeistMono-VariableFont_wght.ttf
